version: '3.8'

services:
  api:
    build: ./backend
    container_name: inspection-assistant-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - POSTGRES_HOST=postgres
      - CHROMA_HOST=chroma
      - MCP_SERVER_HOST=mcp-server
    env_file:
      - .env
    depends_on:
      - postgres
      - chroma
      - mcp-server

  chroma:
    image: chromadb/chroma:latest
    container_name: inspection-assistant-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma

  postgres:
    image: postgres:15
    container_name: inspection-assistant-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}

  streamlit:
    build: ./streamlit_app
    container_name: inspection-assistant-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./streamlit_app:/app
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api

  mcp-server:
    build: ./mcp-server
    container_name: inspection-assistant-mcp-server
    ports:
      - "8002:8000"
    volumes:
      - ./mcp-server:/app
    env_file:
      - .env

  prometheus:
    image: prom/prometheus:latest
    container_name: inspection-assistant-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  grafana:
    image: grafana/grafana:latest
    container_name: inspection-assistant-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - prometheus

volumes:
  postgres-data:
  chroma-data:
  prometheus-data:
  grafana-data: